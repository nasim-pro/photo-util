<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor</title>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>JavaScript Runner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="./JSRun/codemirror.css" rel="stylesheet" />
    <link href="./JSRun/editor-js.css" rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/svg.js/2.7.1/svg.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js2flowchart@1.3.4/dist/js2flowchart.js"></script>

    <style>
        /* Container must be relative for the sidebar to position correctly */
        .editor-container {
            position: relative;
            overflow: hidden;
        }

        /* The Slide-out Panel */
        #flowchart-sidebar {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 0;
            /* Hidden initially */
            background: white;
            z-index: 1000;
            transition: width 0.4s ease;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
            overflow: auto;
            display: flex;
            flex-direction: column;
        }

        #flowchart-sidebar.active {
            width: 50%;
            /* Slides out to half-screen */
        }

        .flow-header {
            padding: 10px;
            background: #2c3e50;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #svg-canvas {
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #toggle-flow-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }

        nav {
            background: #007BFF;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }
        
    </style>
</head>

<body>

    <nav>
        <a href="./index.html">Capture</a>
        <a href="./lossless-compression.html">Lossless Compression</a>
        <a href="./lossy-compress.html">Lossy Compression</a>
        <a href="./metadata-viewer.html">Metadata Viewer</a>
        <a href="./crop-image.html">Crop Image</a>
        <a href="./background-remover.html">Background Remover</a>
    </nav>

    <div class="editor-container">
        <section id="static">
            <pre>
            <code id="static-js" data-height=""></code>
        </pre>
        </section>

        <section id="live" class="live hidden">
            <header class="output-header border-rounded-top-no-bottom">
                <h4 class="output-heading">JavaScript Code Runner</h4>
                <button id="toggle-flow-btn" type="button">View Flowchart</button>
            </header>

            <div id="editor" class="editor"></div>

            <div class="output-container">
                <div class="buttons-container">
                    <button id="execute" class="button run" type="button">
                        Run &rsaquo;
                    </button>
                    <button id="reset" type="button" class="button">Reset</button>
                </div>
                <div id="console" class="output"><code></code></div>
            </div>
        </section>

        <aside id="flowchart-sidebar">
            <div class="flow-header">
                <strong>Flowchart</strong>
                <button onclick="document.getElementById('flowchart-sidebar').classList.remove('active')"
                    style="color:white; background:none; border:1px solid white; cursor:pointer;">Close</button>
            </div>
            <div id="svg-canvas"></div>
        </aside>
    </div>

    <script src="./JSRun/codemirror.js"></script>
    <script src="./JSRun/editor-js.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('toggle-flow-btn');
            const sidebar = document.getElementById('flowchart-sidebar');
            const canvas = document.getElementById('svg-canvas');

            const refreshFlowchart = () => {
                if (!sidebar.classList.contains('active')) return;

                const content = document.querySelector('.cm-content');

                const code = content?.innerText;

                console.log("Code:", code);

                try {
                    if (code) {
                        if (code.trim()) {
                            const svg = js2flowchart.convertCodeToSvg(code);
                            canvas.innerHTML = svg;
                        }
                    }
                } catch (e) {
                    console.error("Error generating flowchart:", e);
                }
            };

            // Toggle Sidebar
            btn.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                if (sidebar.classList.contains('active')) {
                    refreshFlowchart();
                }
            });

        });
    </script>
</body>

</html>
