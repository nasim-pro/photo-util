<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS to Flowchart Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/svg.js/2.7.1/svg.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js2flowchart@1.3.4/dist/js2flowchart.js"></script>

    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
        }

        .header {
            background: #1a73e8;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #code-editor {
            flex: 1;
            padding: 20px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            border: none;
            outline: none;
            background: #282c34;
            color: #abb2bf;
            resize: none;
        }

        #chart-container {
            flex: 1;
            padding: 20px;
            background: white;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .error-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #ea4335;
            color: white;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="header">JavaScript Visual Flowchart Tool</div>

    <div class="workspace">
        <textarea id="code-editor" spellcheck="false">
function checkNumber(num) {
  if (num > 10) {
    console.log('Big');
  } else {
    console.log('Small');
  }
  
  for (let i = 0; i < 3; i++) {
    process(i);
  }
}
    </textarea>
        <div id="chart-container">
        </div>
    </div>

    <div id="error-msg" class="error-overlay">Invalid JS Syntax</div>

    <script>
        const editor = document.getElementById('code-editor');
        const container = document.getElementById('chart-container');
        const errorMsg = document.getElementById('error-msg');

        function updateFlowchart() {
            const code = editor.value;

            try {
                // Clear previous chart
                container.innerHTML = '';

                // Use js2flowchart to convert code to an SVG string
                const svg = js2flowchart.convertCodeToSvg(code);

                // Inject the SVG into our container
                container.innerHTML = svg;
                errorMsg.style.display = 'none';
            } catch (e) {
                // Show error if the JS is currently being typed and is invalid
                errorMsg.style.display = 'block';
                console.error(e);
            }
        }

        // Update on every keystroke
        editor.addEventListener('input', updateFlowchart);

        // Initial render on load
        window.onload = updateFlowchart;
    </script>

</body>

</html>
