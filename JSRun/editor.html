<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor</title>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>JavaScript Runner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="./codemirror.css" rel="stylesheet" />
    <link href="./editor-js.css" rel="stylesheet" />
</head>

<body>
<div class="editor-container">
    <section id="static">
        <pre>
            <code id="static-js" data-height=""></code>
        </pre>
    </section>

    <section id="live" class="live hidden">

        <header class="output-header border-rounded-top-no-bottom">
            <h4 class="output-heading">JavaScript Code Runner</h4>
        </header>

        <div id="editor" class="editor"></div>

        <div class="output-container">
            <div class="buttons-container">
                <button id="execute" class="button run" type="button">
                    Run &rsaquo;
                </button>
                <button id="reset" type="button" class="button">Reset</button>
            </div>
            <div id="console" class="output"><code></code></div>
        </div>

    </section>
</div>
    <script src="./codemirror.js"></script>
    <script src="./editor-js.js"></script>
</body>

</html>
