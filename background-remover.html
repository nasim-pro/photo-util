<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Background Remover — MODNet (ONNX) + BlazeFace guard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6fb;
            padding: 18px;
            text-align: center
        }

        .row {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 16px
        }

        .card {
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #007BFF;
            width: 45%;
            max-width: 560px;
            box-sizing: border-box
        }

        canvas {
            width: 100%;
            height: auto;
            border-radius: 8px;
            background: #eee
        }

        input[type=file] {
            margin-top: 10px
        }

        button {
            margin: 8px;
            padding: 10px 14px;
            border-radius: 6px;
            border: none;
            background: #007BFF;
            color: #fff;
            cursor: pointer
        }

        #status {
            min-height: 20px;
            color: #333;
            margin-top: 6px
        }
    </style>
</head>

<body>
    <h1>Background Remover (MODNet ONNX in-browser)</h1>
    <p>Left = original, Right = transparent result. Face region is protected (BlazeFace).</p>

    <input id="fileInput" type="file" accept="image/*">
    <div class="row">
        <div class="card">
            <h3 style="margin:6px 0">Original</h3>
            <canvas id="origCanvas"></canvas>
            <div style="text-align:center"><button id="reupload">Re-upload</button></div>
        </div>

        <div class="card">
            <h3 style="margin:6px 0">Background Removed</h3>
            <canvas id="resultCanvas"></canvas>
            <div style="text-align:center"><button id="download" style="display:none">Download PNG</button></div>
            <div id="status"></div>
        </div>
    </div>

    <!-- ONNX Runtime Web (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <!-- TensorFlow.js + BlazeFace -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

    <script>
        (async function () {
            // --- CONFIG ---
            // Put modnet.onnx next to this HTML, or change to your hosted model URL (must allow CORS).
            const MODEL_URL = './modnet.onnx';
            // MODNet runs on 512x512 input
            const MODEL_SIZE = 512;

            // nodes
            const fileInput = document.getElementById('fileInput');
            const origCanvas = document.getElementById('origCanvas');
            const resultCanvas = document.getElementById('resultCanvas');
            const reupload = document.getElementById('reupload');
            const downloadBtn = document.getElementById('download');
            const status = document.getElementById('status');

            const octx = origCanvas.getContext('2d');
            const rctx = resultCanvas.getContext('2d');

            // offscreen canvases
            const modelCanvas = document.createElement('canvas');
            const modelCtx = modelCanvas.getContext('2d');
            const alphaCanvas = document.createElement('canvas');
            const alphaCtx = alphaCanvas.getContext('2d');

            // load BlazeFace
            status.textContent = 'Loading face detector...';
            let faceModel = null;
            try {
                faceModel = await blazeface.load();
            } catch (e) {
                console.warn('BlazeFace load failed', e);
                faceModel = null;
            }

            // load MODNet ONNX with ONNX Runtime Web
            status.textContent = 'Loading MODNet (ONNX Runtime Web)... (may take a few seconds)';
            let session = null;
            try {
                session = await ort.InferenceSession.create(MODEL_URL);
            } catch (e) {
                status.textContent = 'Failed to load ONNX model. Check MODEL_URL or CORS. See console.';
                console.error(e);
                return;
            }

            status.textContent = 'Model loaded — ready.';

            // helper: draw image to canvas using cover (center-crop) so content fills square
            function drawImageCover(ctx, img, w, h) {
                const iw = img.naturalWidth || img.width;
                const ih = img.naturalHeight || img.height;
                const scale = Math.max(w / iw, h / ih);
                const nw = iw * scale;
                const nh = ih * scale;
                const dx = (w - nw) / 2;
                const dy = (h - nh) / 2;
                ctx.drawImage(img, dx, dy, nw, nh);
            }

            // preprocess image -> [1,3,H,W] float32 (BGR order, normalized per MODNet doc)
            function preprocessMODNet(img, size = MODEL_SIZE) {
                modelCanvas.width = modelCanvas.height = size;
                // draw center-cropped to size
                drawImageCover(modelCtx, img, size, size);

                const imgData = modelCtx.getImageData(0, 0, size, size).data; // RGBA
                // model expects BGR order and normalization (x-127.5)/127.5 -> [-1,1]
                const floats = new Float32Array(1 * 3 * size * size);
                let rIdx = 0;
                const H = size, W = size;
                // fill channel-first B, G, R
                for (let c = 0; c < 3; c++) {
                    for (let j = 0; j < H; j++) {
                        for (let i = 0; i < W; i++) {
                            const p = (j * W + i) * 4;
                            // read RGBA
                            const r = imgData[p];
                            const g = imgData[p + 1];
                            const b = imgData[p + 2];
                            // channel order BGR
                            const val = (c === 0 ? b : c === 1 ? g : r);
                            floats[rIdx++] = (val - 127.5) / 127.5;
                        }
                    }
                }
                return floats;
            }

            // postprocess output alpha (Float32Array length size*size with values ~[0,1])
            function buildAlphaCanvasFromOutput(outputData, size = MODEL_SIZE) {
                alphaCanvas.width = alphaCanvas.height = size;
                const out = new Uint8ClampedArray(size * size * 4);
                for (let i = 0; i < size * size; ++i) {
                    const v = Math.max(0, Math.min(1, outputData[i])); // clamp
                    const a = Math.round(v * 255);
                    out[i * 4 + 0] = 255; // white (not used directly, alpha used)
                    out[i * 4 + 1] = 255;
                    out[i * 4 + 2] = 255;
                    out[i * 4 + 3] = a;
                }
                const id = new ImageData(out, size, size);
                alphaCtx.putImageData(id, 0, 0);
            }

            // combine alpha with original (original size) and optionally force keep face boxes
            async function compositeResult(img, faceBoxes) {
                // original size
                const ow = img.naturalWidth || img.width;
                const oh = img.naturalHeight || img.height;
                origCanvas.width = resultCanvas.width = ow;
                origCanvas.height = resultCanvas.height = oh;

                // draw original scaled to full size
                octx.clearRect(0, 0, ow, oh);
                octx.drawImage(img, 0, 0, ow, oh);

                // scale alpha canvas to original size
                const scaledAlpha = document.createElement('canvas');
                scaledAlpha.width = ow; scaledAlpha.height = oh;
                const sctx = scaledAlpha.getContext('2d');
                sctx.drawImage(alphaCanvas, 0, 0, ow, oh);

                // if faceBoxes present, paint white rectangles onto scaled alpha to protect face area
                if (faceBoxes && faceBoxes.length) {
                    sctx.fillStyle = 'white';
                    faceBoxes.forEach(b => {
                        // b.topLeft and b.bottomRight are [x,y] in original image coordinates
                        let [x1, y1] = b.topLeft;
                        let [x2, y2] = b.bottomRight;
                        // sometimes BlazeFace returns small boxes; pad
                        const padX = Math.round((x2 - x1) * 0.35);
                        const padY = Math.round((y2 - y1) * 0.6);
                        x1 = Math.max(0, x1 - padX);
                        y1 = Math.max(0, y1 - padY);
                        x2 = Math.min(ow, x2 + padX);
                        y2 = Math.min(oh, y2 + padY);
                        sctx.fillRect(x1, y1, x2 - x1, y2 - y1);
                    });
                }

                // get alpha data scaled
                const alphaData = sctx.getImageData(0, 0, ow, oh).data;

                // draw original into result canvas and set per-pixel alpha
                rctx.clearRect(0, 0, ow, oh);
                rctx.drawImage(img, 0, 0, ow, oh);
                const imgData = rctx.getImageData(0, 0, ow, oh);
                const pixels = imgData.data;
                for (let i = 0; i < ow * oh; ++i) {
                    const a = alphaData[i * 4 + 3]; // a in 0..255
                    pixels[i * 4 + 3] = a;
                }
                rctx.putImageData(imgData, 0, 0);
            }

            // run model inference (MODNet)
            async function runMODNet(img) {
                status.textContent = 'Preprocessing image...';
                const inputData = preprocessMODNet(img, MODEL_SIZE);
                // prepare ort tensor
                const tensor = new ort.Tensor('float32', inputData, [1, 3, MODEL_SIZE, MODEL_SIZE]);
                const inputName = session.inputNames[0];
                const feeds = {};
                feeds[inputName] = tensor;
                status.textContent = 'Running model inference (this may take a second)...';
                const outputMap = await session.run(feeds);
                // pick the first output (alpha matte)
                const outName = session.outputNames[0];
                const outTensor = outputMap[outName];
                // outTensor.data is Float32Array length MODEL_SIZE*MODEL_SIZE (or [1,1,H,W])
                // If shape is [1,1,H,W], data order is contiguous and we can use it directly
                const outData = outTensor.data;
                // If the model outputs an array with multiple channels, you might need to extract channel 0
                // Build alpha canvas
                buildAlphaCanvasFromOutput(outData, MODEL_SIZE);
            }

            // main file handler
            fileInput.addEventListener('change', async (e) => {
                const f = e.target.files && e.target.files[0];
                if (!f) return;
                status.textContent = 'Loading image...';
                downloadBtn.style.display = 'none';
                const img = new Image();
                img.onload = async () => {
                    status.textContent = 'Detecting face (optional) and running MODNet...';
                    // run face detection on original (if available)
                    let faces = [];
                    if (faceModel) {
                        try {
                            const preds = await faceModel.estimateFaces(img, false); // returns predictions with topLeft/bottomRight
                            // normalize & ensure preds use pixel coords
                            faces = preds.map(p => {
                                // p.topLeft, p.bottomRight are arrays
                                const topLeft = Array.isArray(p.topLeft) ? p.topLeft : [p.topLeft[0], p.topLeft[1]];
                                const bottomRight = Array.isArray(p.bottomRight) ? p.bottomRight : [p.bottomRight[0], p.bottomRight[1]];
                                return { topLeft, bottomRight };
                            });
                        } catch (err) {
                            console.warn('Face detect failed', err);
                            faces = [];
                        }
                    }

                    // run matting model
                    try {
                        await runMODNet(img);
                    } catch (err) {
                        console.error('Model inference failed', err);
                        status.textContent = 'Model inference failed — see console.';
                        return;
                    }

                    // composite and protect faces
                    await compositeResult(img, faces);

                    status.textContent = 'Done — you can download the PNG.';
                    downloadBtn.style.display = 'inline-block';
                };
                img.src = URL.createObjectURL(f);
            });

            reupload.addEventListener('click', () => fileInput.click());

            downloadBtn.addEventListener('click', () => {
                const link = document.createElement('a');
                link.href = resultCanvas.toDataURL('image/png');
                link.download = 'bg-removed.png';
                link.click();
            });

        })();
    </script>
</body>

</html>
